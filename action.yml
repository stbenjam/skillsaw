name: 'skillsaw'
description: 'Lint agent skills, plugins, and AI coding assistant context'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Path to lint'
    required: false
    default: '.'
  version:
    description: 'skillsaw version to install (e.g. "0.12.1"). Defaults to the version this action was released with.'
    required: false
    default: '0.15.0'
  strict:
    description: 'Treat warnings as errors'
    required: false
    default: 'false'
  plugins:
    description: 'Newline-separated list of plugin packages to install (e.g. skillsaw-runbooks==0.1.0)'
    required: false
    default: ''
  verbose:
    description: 'Include info-level violations'
    required: false
    default: 'false'
  no-custom-rules:
    description: 'Skip custom rules defined in .skillsaw.yaml (recommended for CI on untrusted PRs)'
    required: false
    default: 'true'

outputs:
  exit-code:
    description: 'skillsaw exit code (0=pass, 1=errors or strict warnings)'
    value: ${{ steps.lint.outputs.exit-code }}
  errors:
    description: 'Number of errors found'
    value: ${{ steps.lint.outputs.errors }}
  warnings:
    description: 'Number of warnings found'
    value: ${{ steps.lint.outputs.warnings }}
  report-file:
    description: 'Path to JSON report file'
    value: ${{ steps.lint.outputs.report-file }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install skillsaw
      shell: bash
      env:
        SKILLSAW_VERSION: ${{ inputs.version }}
        ACTION_PATH: ${{ github.action_path }}
        SKILLSAW_PLUGINS: ${{ inputs.plugins }}
      run: |
        if [ -f "$ACTION_PATH/pyproject.toml" ]; then
          pip install -q "$ACTION_PATH"
        else
          pip install -q "skillsaw==$SKILLSAW_VERSION"
        fi
        if [ -n "$SKILLSAW_PLUGINS" ]; then
          reqs=$(mktemp)
          printf '%s\n' "$SKILLSAW_PLUGINS" > "$reqs"
          pip install -q -r "$reqs"
          rm "$reqs"
        fi

    - name: Run skillsaw
      id: lint
      shell: bash
      env:
        SKILLSAW_PATH: ${{ inputs.path }}
        SKILLSAW_STRICT: ${{ inputs.strict }}
        SKILLSAW_VERBOSE: ${{ inputs.verbose }}
        SKILLSAW_NO_CUSTOM_RULES: ${{ inputs.no-custom-rules }}
      run: |
        set +e
        ARGS=""
        if [ "$SKILLSAW_STRICT" = "true" ]; then
          ARGS="$ARGS --strict"
        fi
        if [ "$SKILLSAW_VERBOSE" = "true" ]; then
          ARGS="$ARGS -v"
        fi
        if [ "$SKILLSAW_NO_CUSTOM_RULES" = "true" ]; then
          ARGS="$ARGS --no-custom-rules"
        fi

        REPORT_FILE=$(mktemp --suffix=.json)
        skillsaw $ARGS --format text --output "$REPORT_FILE" "$SKILLSAW_PATH"
        EXIT_CODE=$?

        echo "exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
        echo "report-file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"

        ERRORS=$(python3 -c "import json; print(json.load(open('$REPORT_FILE'))['summary']['errors'])" 2>/dev/null || echo "0")
        WARNINGS=$(python3 -c "import json; print(json.load(open('$REPORT_FILE'))['summary']['warnings'])" 2>/dev/null || echo "0")
        echo "errors=${ERRORS}" >> "$GITHUB_OUTPUT"
        echo "warnings=${WARNINGS}" >> "$GITHUB_OUTPUT"


    - name: Upload report artifact
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: skillsaw-report
        path: ${{ steps.lint.outputs.report-file }}
        retention-days: 1

    - name: Save PR metadata
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        echo '${{ github.event.pull_request.number }}' > /tmp/skillsaw-pr-number
        echo '${{ github.event.pull_request.head.sha }}' > /tmp/skillsaw-head-sha
    - name: Upload PR metadata
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: skillsaw-pr-metadata
        path: |
          /tmp/skillsaw-pr-number
          /tmp/skillsaw-head-sha
        retention-days: 1

    - name: Exit with skillsaw result
      shell: bash
      env:
        SKILLSAW_EXIT_CODE: ${{ steps.lint.outputs.exit-code }}
      run: exit "${SKILLSAW_EXIT_CODE}"
