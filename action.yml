name: 'skillsaw'
description: 'Lint agent skills, plugins, and AI coding assistant context'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Path to lint'
    required: false
    default: '.'
  version:
    description: 'skillsaw version to install (e.g. "0.4.3"). Empty for latest.'
    required: false
    default: ''
  strict:
    description: 'Treat warnings as errors'
    required: false
    default: 'false'
  verbose:
    description: 'Include info-level violations'
    required: false
    default: 'false'
  token:
    description: 'GitHub token for posting PR review comments'
    required: false
    default: ${{ github.token }}

outputs:
  exit-code:
    description: 'skillsaw exit code (0=pass, 1=errors, 2=strict+warnings)'
    value: ${{ steps.lint.outputs.exit-code }}
  errors:
    description: 'Number of errors found'
    value: ${{ steps.lint.outputs.errors }}
  warnings:
    description: 'Number of warnings found'
    value: ${{ steps.lint.outputs.warnings }}
  report:
    description: 'Full JSON report'
    value: ${{ steps.lint.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install skillsaw
      shell: bash
      env:
        SKILLSAW_VERSION: ${{ inputs.version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        if [ -n "$SKILLSAW_VERSION" ]; then
          pip install -q "skillsaw==$SKILLSAW_VERSION"
        elif [ -f "$ACTION_PATH/pyproject.toml" ]; then
          pip install -q "$ACTION_PATH"
        else
          pip install -q skillsaw
        fi

    - name: Run skillsaw
      id: lint
      shell: bash
      env:
        SKILLSAW_PATH: ${{ inputs.path }}
        SKILLSAW_STRICT: ${{ inputs.strict }}
        SKILLSAW_VERBOSE: ${{ inputs.verbose }}
      run: |
        set +e
        ARGS=""
        if [ "$SKILLSAW_STRICT" = "true" ]; then
          ARGS="$ARGS --strict"
        fi
        if [ "$SKILLSAW_VERBOSE" = "true" ]; then
          ARGS="$ARGS -v"
        fi

        REPORT_FILE=$(mktemp --suffix=.json)
        skillsaw $ARGS --format text --output "$REPORT_FILE" "$SKILLSAW_PATH"
        EXIT_CODE=$?

        echo "exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
        echo "report-file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"

        ERRORS=$(python3 -c "import json; print(json.load(open('$REPORT_FILE'))['summary']['errors'])" 2>/dev/null || echo "0")
        WARNINGS=$(python3 -c "import json; print(json.load(open('$REPORT_FILE'))['summary']['warnings'])" 2>/dev/null || echo "0")
        echo "errors=${ERRORS}" >> "$GITHUB_OUTPUT"
        echo "warnings=${WARNINGS}" >> "$GITHUB_OUTPUT"

        DELIM="SKILLSAW_EOF_$(head -c 16 /dev/urandom | base64 | tr -dc 'A-Za-z0-9')"
        {
          echo "report<<${DELIM}"
          cat "$REPORT_FILE"
          echo "${DELIM}"
        } >> "$GITHUB_OUTPUT"

    - name: Upload report artifact
      if: github.event_name == 'pull_request' && always()
      uses: actions/upload-artifact@v4
      with:
        name: skillsaw-report
        path: ${{ steps.lint.outputs.report-file }}
        retention-days: 1

    - name: Save PR metadata
      if: github.event_name == 'pull_request' && always()
      shell: bash
      run: |
        echo '${{ github.event.pull_request.number }}' > /tmp/skillsaw-pr-number
        echo '${{ github.event.pull_request.head.sha }}' > /tmp/skillsaw-head-sha
    - name: Upload PR metadata
      if: github.event_name == 'pull_request' && always()
      uses: actions/upload-artifact@v4
      with:
        name: skillsaw-pr-metadata
        path: |
          /tmp/skillsaw-pr-number
          /tmp/skillsaw-head-sha
        retention-days: 1

    - name: Post PR review
      if: github.event.pull_request != null && github.event_name != 'pull_request'
      shell: bash
      run: python3 "${{ github.action_path }}/action/review.py"
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        SKILLSAW_REPORT_FILE: ${{ steps.lint.outputs.report-file }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    - name: Exit with skillsaw result
      shell: bash
      env:
        SKILLSAW_EXIT_CODE: ${{ steps.lint.outputs.exit-code }}
      run: exit "${SKILLSAW_EXIT_CODE}"
