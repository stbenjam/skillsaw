name: skillsaw
version: 0.4.0
description: A configurable linter for agent skills, plugins, and AI coding assistant context
targets:
  - claude
  - copilot
  - cursor
  - codex
  - opencode

# Keep test fixtures out of primitive discovery: a committed
# `*.instructions.md` (or any primitive) under tests/ would otherwise be
# vacuumed into the generated AGENTS.md / copilot-instructions.md.
compilation:
  exclude:
    - "tests/**"

dependencies:
  apm:
    - ./skills/skillsaw-create-plugin
    - ./skills/skillsaw-fix
    - ./skills/skillsaw-onboard
