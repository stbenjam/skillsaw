site_name: "Skillsaw: Advanced Linter for Agent Context"
site_description: A configurable linter for agent skills, plugins, and AI coding assistant context
site_url: https://skillsaw.org
repo_url: https://github.com/stbenjam/skillsaw
repo_name: stbenjam/skillsaw

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - navigation.path
  logo: images/logo-only.png
  favicon: images/logo-only.png
  icon:
    repo: fontawesome/brands/github


extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

exclude_docs: |
  designs/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Autofixing: autofixing.md
    - Baseline: baseline.md
    - Configuration: configuration.md
    - Repository Types: repo-types.md
    - CI Integration: ci.md
    - CLI Reference: cli.md
    - Custom Rules: custom-rules.md
    - Scaffolding: scaffolding.md
    - Lint Tree: lint-tree.md
  - Rules:
    - rules/index.md
    - AgentSkills: rules/agentskills.md
    - Claude Code:
      - rules/claude-code/index.md
      - Plugin Structure: rules/claude-code/plugin-structure.md
      - Command Format: rules/claude-code/command-format.md
      - Marketplace: rules/claude-code/marketplace.md
      - Agents: rules/claude-code/agents.md
      - Hooks: rules/claude-code/hooks.md
      - MCP: rules/claude-code/mcp.md
      - Rules Directory: rules/claude-code/rules-directory.md
    - Cursor: rules/cursor.md
    - OpenClaw: rules/openclaw.md
    - Instruction Files: rules/instruction-files.md
    - Context Budget: rules/context-budget.md
    - Content Intelligence:
      - rules/content/index.md
      - rules/content/weak-language.md
      - rules/content/tautological.md
      - rules/content/critical-position.md
      - rules/content/redundant-with-tooling.md
      - rules/content/instruction-budget.md
      - rules/content/negative-only.md
      - rules/content/section-length.md
      - rules/content/contradiction.md
      - rules/content/hook-candidate.md
      - rules/content/actionability-score.md
      - rules/content/cognitive-chunks.md
      - rules/content/embedded-secrets.md
      - rules/content/banned-references.md
      - rules/content/inconsistent-terminology.md
      - rules/content/broken-internal-reference.md
      - rules/content/unlinked-internal-reference.md
      - rules/content/placeholder-text.md
    - CodeRabbit: rules/coderabbit.md
    - Promptfoo: rules/promptfoo.md
    - APM: rules/apm.md
  - Research: research.md
