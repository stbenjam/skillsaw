name: LLM Integration Tests

on:
  pull_request:
    paths:
      - 'tests/test_llm_integration.py'
      - 'tests/test_parallel.py'
      - 'src/skillsaw/llm/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC

jobs:
  llm-integration:
    runs-on: ubuntu-latest
    if: github.repository == 'stbenjam/skillsaw'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev,llm]"

      - name: Run LLM integration tests (mocked)
        run: pytest tests/test_llm_integration.py tests/test_parallel.py -v

      - name: Run LLM integration tests (live)
        if: env.OPENROUTER_API_KEY != ''
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SKILLSAW_MODEL: openrouter/minimax/minimax-m2.7
          SKILLSAW_LLM_INTEGRATION: '1'
        run: pytest tests/test_llm_integration.py -v -k "Live"
