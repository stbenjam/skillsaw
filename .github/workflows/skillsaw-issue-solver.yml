name: Skillsaw Issue Solver

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: skillsaw-agent
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  # Required: claude-code-action exchanges a GitHub OIDC token for its
  # app token at startup. Without this the action aborts immediately.
  id-token: write

jobs:
  issue-solver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get labeled issues with trusted content only
        id: activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get collaborators (trusted users)
          COLLABS=$(gh api "repos/${{ github.repository }}/collaborators" --jq '[.[].login]')
          echo "Collaborators: $COLLABS"

          # Get open issues labeled "issue-for-agent" (label = collaborator sign-off)
          ISSUES=$(gh issue list --state open --label issue-for-agent \
            --json number,title,body,author --jq '.')

          ISSUE_COUNT=$(echo "$ISSUES" | jq length)
          echo "Issues labeled issue-for-agent: $ISSUE_COUNT"

          if [ "$ISSUE_COUNT" = "0" ]; then
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
            echo "[]" > /tmp/issues-with-comments.json
            exit 0
          fi
          echo "has_issues=true" >> "$GITHUB_OUTPUT"

          # For each issue, include trusted comments only:
          # - Collaborator comments: always trusted (any time)
          # - Non-collaborator comments: only before the label was added
          echo "$ISSUES" | jq -c '.[]' | while read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')

            # Find when issue-for-agent label was added
            LABEL_TIME=$(gh api "repos/${{ github.repository }}/issues/$NUM/events" \
              --jq '[.[] | select(.event == "labeled" and .label.name == "issue-for-agent")] | last | .created_at')

            if [ -z "$LABEL_TIME" ] || [ "$LABEL_TIME" = "null" ]; then
              echo "$issue" | jq '. + {label_added_at: "", trusted_comments: []}'
            else
              COMMENTS=$(gh api "repos/${{ github.repository }}/issues/$NUM/comments" \
                | jq --arg lt "$LABEL_TIME" --argjson collabs "$COLLABS" \
                '[.[] | select(
                  (.user.login as $u | $collabs | index($u))
                  or (.created_at <= $lt)
                ) | {user: .user.login, body, created_at}]')

              echo "$issue" | jq --arg lt "$LABEL_TIME" --argjson c "$COMMENTS" \
                '. + {label_added_at: $lt, trusted_comments: $c}'
            fi
          done | jq -s '.' > /tmp/issues-with-comments.json

          echo "Prepared issues with trusted comments:"
          cat /tmp/issues-with-comments.json | jq '[.[] | {number, title, comment_count: (.trusted_comments | length)}]'

      - uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        if: steps.activity.outputs.has_issues == 'true'
        with:
          prompt: |
            Use the skillsaw-issue-solver skill. Follow every step in the skill.

            ## Issues to solve

            Each issue includes only trusted content: collaborator comments (any
            time) and non-collaborator comments from before the label was added.
            Create a separate [Auto] PR for each. Skip any already addressed by
            an open PR.

            <issues>
            $(cat /tmp/issues-with-comments.json)
            </issues>
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools Edit,Write,Read,Bash,WebFetch,WebSearch,Skill,Agent,Glob,Grep,TodoWrite,TodoRead,TaskCreate,TaskUpdate,TaskList,TaskGet,EnterWorktree,ExitWorktree
            --max-turns 200
            --model claude-opus-4-8

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: claude-execution-log-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
          retention-days: 30
