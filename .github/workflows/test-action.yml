name: Test Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  self-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: ./
        with:
          strict: true
          no-custom-rules: false
          plugins: |
            skillsaw-typos==0.1.0
