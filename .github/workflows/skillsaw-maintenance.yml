name: Skillsaw Maintenance

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Use the skillsaw-maintenance skill. Follow every step in the skill.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools Edit,Write,Read,Bash
            --max-turns 50

      - name: Upload execution log as private gist
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOG="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$LOG" ]; then
            GIST_URL=$(gh gist create --private --desc "skillsaw-maintenance run ${{ github.run_id }}" "$LOG")
            echo "Execution log: $GIST_URL"
          else
            echo "No execution log found"
          fi
