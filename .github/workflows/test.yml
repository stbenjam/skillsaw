name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src/skillsaw --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "black>=26,<27" flake8

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  verify-update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev]'

      - name: Install uv (for APM)
        uses: astral-sh/setup-uv@v6

      - name: Run make update
        run: make update

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "make update produced changes that were not committed:"
            git diff
            git status
            exit 1
          fi

  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Test --version
        run: skillsaw --version

      - name: Test list-rules
        run: skillsaw list-rules

      - name: Test init
        run: |
          cd /tmp
          skillsaw init
          test -f .skillsaw.yaml

      - name: Test claudelint shim
        run: |
          claudelint --version 2>&1 | grep -q "renamed"

      - name: Create test plugin and lint it
        run: |
          mkdir -p /tmp/test-plugin/.claude-plugin
          mkdir -p /tmp/test-plugin/commands

          # Create plugin.json
          cat > /tmp/test-plugin/.claude-plugin/plugin.json << 'EOF'
          {
            "name": "test-plugin",
            "description": "A test plugin",
            "version": "1.0.0",
            "author": {"name": "Test"}
          }
          EOF

          # Create command
          cat > /tmp/test-plugin/commands/test.md << 'EOF'
          ---
          description: Test command
          ---

          ## Name
          test-plugin:test

          ## Synopsis
          ```
          /test-plugin:test
          ```

          ## Description
          Test command

          ## Implementation
          Do something
          EOF

          # Lint it
          skillsaw /tmp/test-plugin

          # Should pass with no errors
          if [ $? -ne 0 ]; then
            echo "Linting failed!"
            exit 1
          fi

      - name: Test ai-helpers repo
        run: |
          git clone https://github.com/openshift-eng/ai-helpers.git /tmp/ai-helpers

          skillsaw --format json /tmp/ai-helpers | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          assert r['stats']['plugins'] > 0, 'no plugins scanned'
          assert r['stats']['rules_run'] > 0, 'no rules ran'
          print(f\"Scanned {r['stats']['plugins']} plugins, {r['stats']['skills']} skills, {r['stats']['rules_run']} rules\")
          "

      - name: Test auth0/agent-skills repo
        run: |
          git clone https://github.com/auth0/agent-skills.git /tmp/agent-skills

          skillsaw --format json /tmp/agent-skills | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          assert r['stats']['rules_run'] > 0, 'no rules ran'
          print(f\"Scanned {r['stats']['plugins']} plugins, {r['stats']['skills']} skills, {r['stats']['rules_run']} rules\")
          "

      - name: Test --output flag with multiple formats
        run: |
          git clone https://github.com/openshift-eng/ai-helpers.git /tmp/ai-helpers-output 2>/dev/null || true

          skillsaw --output /tmp/report.json --output /tmp/report.sarif --output /tmp/report.html /tmp/ai-helpers

          python3 -c "
          import json, os

          for f in ['/tmp/report.json', '/tmp/report.sarif', '/tmp/report.html']:
              assert os.path.exists(f), f'{f} not created'
              assert os.path.getsize(f) > 0, f'{f} is empty'

          with open('/tmp/report.json') as f:
              data = json.load(f)
              assert 'stats' in data
              assert 'violations' in data

          with open('/tmp/report.sarif') as f:
              sarif = json.load(f)
              assert sarif['version'] == '2.1.0'
              assert len(sarif['runs']) == 1

          print('All output files validated successfully')
          "
