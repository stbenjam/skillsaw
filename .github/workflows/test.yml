name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src/skillsaw --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "black>=26,<27" flake8

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Test --version
        run: skillsaw --version

      - name: Test --list-rules
        run: skillsaw --list-rules

      - name: Test --init
        run: |
          cd /tmp
          skillsaw --init
          test -f .skillsaw.yaml

      - name: Test agentlint shim
        run: |
          agentlint --version 2>&1 | grep -q "renamed"

      - name: Test claudelint shim
        run: |
          claudelint --version 2>&1 | grep -q "renamed"

      - name: Create test plugin and lint it
        run: |
          mkdir -p /tmp/test-plugin/.claude-plugin
          mkdir -p /tmp/test-plugin/commands

          # Create plugin.json
          cat > /tmp/test-plugin/.claude-plugin/plugin.json << 'EOF'
          {
            "name": "test-plugin",
            "description": "A test plugin",
            "version": "1.0.0",
            "author": {"name": "Test"}
          }
          EOF

          # Create command
          cat > /tmp/test-plugin/commands/test.md << 'EOF'
          ---
          description: Test command
          ---

          ## Name
          test-plugin:test

          ## Synopsis
          ```
          /test-plugin:test
          ```

          ## Description
          Test command

          ## Implementation
          Do something
          EOF

          # Lint it
          skillsaw /tmp/test-plugin

          # Should pass with no errors
          if [ $? -ne 0 ]; then
            echo "Linting failed!"
            exit 1
          fi

      - name: Test ai-helpers repo
        run: |
          # Clone ai-helpers repo
          git clone https://github.com/openshift-eng/ai-helpers.git /tmp/ai-helpers

          # Disable agentskills rules until ai-helpers updates its skills
          python3 -c "
          import yaml
          with open('/tmp/ai-helpers/.claudelint.yaml') as f:
              cfg = yaml.safe_load(f) or {}
          rules = cfg.setdefault('rules', {})
          for r in ['agentskill-valid','agentskill-name','agentskill-description',
                     'agentskill-structure','agentskill-evals','agentskill-evals-required']:
              rules[r] = {'enabled': False}
          with open('/tmp/ai-helpers/.claudelint.yaml', 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          "

          # Lint it
          skillsaw /tmp/ai-helpers

          # Should pass with no errors
          if [ $? -ne 0 ]; then
            echo "ai-helpers repo failed skillsaw!"
            exit 1
          fi
