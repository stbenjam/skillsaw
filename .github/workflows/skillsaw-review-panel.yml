name: Skillsaw Review Panel

on:
  pull_request_target:
    types: [labeled]

concurrency:
  group: panel-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  panel-review:
    if: github.event.label.name == 'panel-review'
    runs-on: ubuntu-latest
    steps:
      - name: Remove panel-review label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label panel-review --repo ${{ github.repository }} || true

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        with:
          prompt: |
            Use the skillsaw-review-panel skill. Follow every step in the skill.

            Review PR #${{ github.event.pull_request.number }}.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools Edit,Write,Read,Bash,WebFetch,WebSearch,Skill,Glob,Grep,TaskCreate,TaskUpdate,TaskList,TaskGet
            --max-turns 50
            --model claude-opus-4-8

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: panel-review-log-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
          retention-days: 30
