name: Skillsaw PR Review

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  pr-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get reviewable PRs
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRS=$(gh pr list --state open --author stbenjam --json number,title --jq '.[]' 2>/dev/null; \
                gh pr list --state open --author app/claude --json number,title --jq '.[]' 2>/dev/null)
          if [ -z "$PRS" ]; then
            echo "No open PRs from stbenjam or claude"
            echo "has_prs=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_prs=true" >> "$GITHUB_OUTPUT"
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "pr_list<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$PRS" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        if: steps.prs.outputs.has_prs == 'true'
        with:
          prompt: |
            Use the skillsaw-pr-review skill. Follow every step in the skill.
            IMPORTANT: Only review the following PRs. Do NOT review any other PRs.
            ${{ steps.prs.outputs.pr_list }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools Edit,Write,Read,Bash,WebFetch,WebSearch,Skill,Agent,Glob,Grep,TodoWrite,TodoRead,TaskCreate,TaskUpdate,TaskList,TaskGet,EnterWorktree,ExitWorktree
            --max-turns 100
            --model claude-opus-4-6

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
          retention-days: 30
