name: Skillsaw PR Review

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: skillsaw-agent
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  pr-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Restore last run timestamp
        uses: actions/cache/restore@v4
        with:
          path: .last-pr-review-run
          key: pr-review-last-run

      - name: Get reviewable PRs and new activity
        id: activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .last-pr-review-run ]; then
            SINCE=$(cat .last-pr-review-run)
          else
            SINCE=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          fi
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"

          # Get list of collaborators (trusted users only)
          COLLABS=$(gh api "repos/${{ github.repository }}/collaborators" --jq '[.[].login]')
          echo "Collaborators: $COLLABS"

          # Open PRs from collaborators and claude bot
          PRS=$(gh pr list --state open --json number,title,author \
            | jq --argjson collabs "$COLLABS" \
            '[.[] | select(.author.login as $u | ($collabs | index($u)) or ($u == "app/claude"))]')

          if [ -z "$PRS" ] || [ "$PRS" = "[]" ]; then
            echo "No open PRs from collaborators or claude"
            echo "has_prs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_prs=true" >> "$GITHUB_OUTPUT"
          echo "$PRS" > /tmp/open-prs.json

          # New PR review comments from collaborators since last run
          gh api "repos/${{ github.repository }}/pulls/comments?since=$SINCE&per_page=100" \
            | jq --argjson collabs "$COLLABS" \
            '[.[] | select(.user.login as $u | $collabs | index($u)) | {id, pull_request_url, user: .user.login, body, path, line, created_at}]' \
            > /tmp/new-review-comments.json

          # New PR-level comments from collaborators since last run
          gh api "repos/${{ github.repository }}/issues/comments?since=$SINCE&per_page=100" \
            | jq --argjson collabs "$COLLABS" \
            '[.[] | select(.user.login as $u | $collabs | index($u)) | {id, issue_url, user: .user.login, body, created_at}]' \
            > /tmp/new-pr-comments.json

          echo "Open PRs from collaborators/claude:"
          cat /tmp/open-prs.json | jq length
          echo "New review comments from collaborators since $SINCE:"
          cat /tmp/new-review-comments.json | jq length
          echo "New PR comments from collaborators since $SINCE:"
          cat /tmp/new-pr-comments.json | jq length

      - uses: anthropics/claude-code-action@v1
        if: steps.activity.outputs.has_prs == 'true'
        with:
          prompt: |
            Use the skillsaw-pr-review skill. Follow every step in the skill.

            IMPORTANT: Only review the following PRs. Do NOT review any other PRs.

            <open-prs>
            $(cat /tmp/open-prs.json)
            </open-prs>

            ## New review comments from collaborators since ${{ steps.activity.outputs.since }}

            <inline-review-comments>
            $(cat /tmp/new-review-comments.json)
            </inline-review-comments>

            <pr-level-comments>
            $(cat /tmp/new-pr-comments.json)
            </pr-level-comments>
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools Edit,Write,Read,Bash,WebFetch,WebSearch,Skill,Agent,Glob,Grep,TodoWrite,TodoRead,TaskCreate,TaskUpdate,TaskList,TaskGet,EnterWorktree,ExitWorktree
            --max-turns 100
            --model claude-opus-4-6

      - name: Save last run timestamp
        if: always()
        run: date -u '+%Y-%m-%dT%H:%M:%SZ' > .last-pr-review-run

      - name: Cache last run timestamp
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .last-pr-review-run
          key: pr-review-last-run-${{ github.run_id }}

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
          retention-days: 30
