name: Promptfoo Compatibility

on:
  schedule:
    - cron: "23 8 * * *"
  workflow_dispatch:

jobs:
  promptfoo-compat:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install skillsaw
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Test promptfoo/promptfoo
        run: |
          git clone --depth 1 https://github.com/promptfoo/promptfoo.git /tmp/promptfoo

          skillsaw lint --rule promptfoo-valid --format json /tmp/promptfoo | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          assert 'promptfoo' in r['stats']['repo_types'], 'not detected as promptfoo repo'
          assert r['summary']['errors'] == 0, f\"promptfoo-valid errors: {r['summary']['errors']}\"
          print(f\"Repo type: {r['stats']['repo_types']}\")
          print(f\"Rules run: {r['stats']['rules_run']}\")
          print(f\"Errors: {r['summary']['errors']}, Warnings: {r['summary']['warnings']}\")
          "
