name: Skillsaw Ecosystem Scout

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        with:
          prompt: |
            Use the skillsaw-ecosystem-scout skill. Follow every step in the skill.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --allowedTools Edit,Write,Read,Bash,WebFetch,WebSearch,Skill,Agent,Glob,Grep,TodoWrite,TodoRead,TaskCreate,TaskUpdate,TaskList,TaskGet
            --max-turns 200
            --model claude-fable-5

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: claude-execution-log-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
          retention-days: 30
