name: Lint Plugins

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint with skillsaw
        uses: stbenjam/skillsaw@v0
        with:
          strict: 'true'
          verbose: 'true'
