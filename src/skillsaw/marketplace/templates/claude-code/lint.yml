name: Lint Plugins

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install skillsaw
        run: pip install skillsaw

      - name: Run skillsaw
        run: skillsaw -v --strict
